version: '3.8'

services:
  # Database: MongoDB
  mongodb:
    image: mongo:6.0
    container_name: ai-task-mongodb
    restart: always
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - ai-network

  # Message Broker: Redis
  redis:
    image: redis:7-alpine
    container_name: ai-task-redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - ai-network

  # Backend REST API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ai-task-backend
    restart: always
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - MONGO_URI=mongodb://mongodb:27017/ai_tasks
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=local_development_jwt_secret_key_12345
      - FRONTEND_URL=http://localhost:3000
    depends_on:
      - mongodb
      - redis
    networks:
      - ai-network

  # Python Processing Worker
  worker:
    build:
      context: ./worker
      dockerfile: Dockerfile
    container_name: ai-task-worker
    restart: always
    environment:
      - MONGO_URI=mongodb://mongodb:27017/ai_tasks
      - REDIS_URL=redis://redis:6379
    depends_on:
      - mongodb
      - redis
    networks:
      - ai-network

  # Frontend Client
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=http://localhost:5000/api
    container_name: ai-task-frontend
    restart: always
    ports:
      - "3000:8080"
    depends_on:
      - backend
    networks:
      - ai-network

volumes:
  mongo_data:
  redis_data:

networks:
  ai-network:
    driver: bridge
